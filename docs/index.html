<style>
  :root {
    --ink: #0A0B12;
    --text: #F4F5FA;
    --muted: rgba(255,255,255,0.88);
    --faint: rgba(255,255,255,0.68);
    --accent: #8B8CFF;
    --accent-2: #4FD6C4;
    --line: rgba(255,255,255,0.10);
    --mat: clamp(8px, 1vw, 13px);
    --display: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, sans-serif;
    --body: ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { margin: 0; background: #fff; color: var(--text); font-family: var(--body); line-height: 1.5; }
  a { color: inherit; text-decoration: none; }
  :focus-visible { outline: 2px solid #fff; outline-offset: 3px; border-radius: 6px; }

  /* ---- White mat frame around a galaxy "shell" (aside.com style) ---- */
  .shell {
    position: relative;
    margin: var(--mat) var(--mat) 0;
    min-height: calc(100svh - var(--mat));
    border-radius: 22px 22px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--ink);
  }
  /* Softly blurred, slightly brightened photo (its own layer so content stays sharp). */
  .shell::before {
    content: ""; position: absolute; inset: -30px; pointer-events: none;
    background: url("assets/bg.webp") center 30% / cover no-repeat;
    filter: blur(6px) brightness(1.1) saturate(0.94);
    transform: scale(1.03);
  }
  /* Gentle, even scrim for legibility (lighter than before). */
  .shell::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(10,12,20,0.38) 0%, rgba(10,12,20,0.18) 38%, rgba(10,12,20,0.24) 70%, rgba(10,12,20,0.40) 100%);
  }
  .shell > * { position: relative; z-index: 1; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(20px, 5vw, 48px); }
  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--display); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; }
  .brand svg { width: 26px; height: auto; color: var(--text); }
  .ghost-link { font-size: 14px; color: var(--muted); transition: color .2s; }
  .ghost-link:hover { color: #fff; }

  /* ---- Hero ---- */
  .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px clamp(20px, 5vw, 48px) 56px; }
  .eyebrow { font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); text-shadow: 0 1px 16px rgba(0,0,0,0.45); margin-bottom: 22px; opacity: 0; animation: rise .7s ease .1s both; }
  h1 { font-family: var(--display); font-weight: 600; font-size: clamp(34px, 5.8vw, 66px); line-height: 1.03; letter-spacing: -0.03em; margin: 0; max-width: 16ch; text-shadow: 0 2px 40px rgba(0,0,0,0.45); }
  h1 .line { display: block; opacity: 0; animation: rise .8s cubic-bezier(0.16,1,0.3,1) both; }
  h1 .line:nth-child(1) { animation-delay: .2s; }
  h1 .line:nth-child(2) { animation-delay: .32s; color: var(--muted); }
  h1 .glow { color: #fff; text-shadow: 0 0 36px rgba(139,140,255,0.7); }
  .sub { margin: 22px auto 0; max-width: 46ch; font-size: clamp(15px, 1.7vw, 17px); color: var(--muted); text-shadow: 0 1px 20px rgba(0,0,0,0.5); opacity: 0; animation: rise .8s ease .48s both; }

  /* ---- Demo video ---- */
  .stage { margin: 40px 0 8px; display: flex; justify-content: center; opacity: 0; animation: rise .9s ease .62s both; }
  .demo-video {
    width: min(680px, 92vw); aspect-ratio: 1240 / 400; height: auto; display: block;
    border-radius: 16px; background: #000; object-fit: cover;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 30px 80px -24px rgba(0,0,0,0.92), 0 0 90px -16px rgba(139,140,255,0.35);
  }

  .cta { margin-top: 30px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; opacity: 0; animation: rise .8s ease .74s both; }
  .btn { font-family: var(--body); font-size: 15px; font-weight: 500; border-radius: 12px; padding: 12px 22px; display: inline-flex; align-items: center; gap: 9px; transition: transform .15s ease, box-shadow .2s ease, background .2s; cursor: pointer; }
  .btn-primary { background: #fff; color: #0A0B12; box-shadow: 0 10px 40px -12px rgba(0,0,0,0.6); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 50px -12px rgba(139,140,255,0.7); }
  .btn-ghost { color: #fff; border: 1px solid rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); }
  .meta { margin-top: 20px; font-family: var(--mono); font-size: 12px; color: var(--faint); text-shadow: 0 1px 16px rgba(0,0,0,0.45); letter-spacing: 0.04em; opacity: 0; animation: rise .8s ease .86s both; }

  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* ---- Footer (full-width white, below the framed hero) ---- */
  footer { background: #fff; padding: 22px clamp(20px,5vw,48px); border-top: 1px solid rgba(0,0,0,0.06); }
  .foot-row { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px 28px; }
  footer .brand { color: #15171d; }
  footer .brand svg { color: #15171d; }
  .foot-links { display: flex; gap: clamp(16px, 3vw, 26px); flex-wrap: wrap; }
  .foot-links a { color: #565c6b; font-size: 14px; transition: color .2s; }
  .foot-links a:hover { color: #15171d; }
  .foot-copy { color: #9aa0ae; font-family: var(--mono); font-size: 12px; letter-spacing: 0.03em; }

  @media (prefers-reduced-motion: reduce) {
    .eyebrow, h1 .line, .sub, .stage, .cta, .meta { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>

  <script>
